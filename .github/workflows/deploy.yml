name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "agent/**"
      - "Dockerfile.*"
      - "compose.yml"
      - "Caddyfile"

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/portfolio
            git pull
            docker compose up -d --build
            docker compose ps
