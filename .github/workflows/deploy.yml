name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "agent/**"
      - "Dockerfile.*"
      - "compose.yml"
      - "Caddyfile"

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy
        run: |
          cd ~/portfolio
          git pull
          docker compose up -d --build
          docker compose ps
